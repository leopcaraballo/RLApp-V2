name: Performance Baseline

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration in seconds"
        default: "15"
        required: false

jobs:
  api-benchmark:
    name: API Response Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start full stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose --profile frontend up --build -d --wait

      - name: Install k6
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://dl.k6.io/key.gpg | gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run health endpoint benchmark
        shell: bash
        run: |
          cat > /tmp/k6-health.js << 'K6SCRIPT'
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = {
            vus: 10,
            duration: '${{ github.event.inputs.duration || 15 }}s',
            thresholds: {
              http_req_duration: ['p(95)<500'],
              http_req_failed: ['rate<0.01'],
            },
          };
          export default function () {
            const res = http.get('http://127.0.0.1:5094/health/startup');
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          K6SCRIPT
          k6 run /tmp/k6-health.js --summary-export=/tmp/k6-results.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: /tmp/k6-results.json

      - name: Stop stack
        if: always()
        shell: bash
        run: docker compose --profile frontend down --remove-orphans || true
