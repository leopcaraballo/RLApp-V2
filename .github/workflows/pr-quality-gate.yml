name: PR Quality Gate

env:
  DOCS_ROOT: docs/project

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR metadata
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const title = context.payload.pull_request.title || "";
            const text = `${title}\n${body}`;

            const headRef = context.payload.pull_request.head.ref;
            const baseRef = context.payload.pull_request.base.ref;
            if (headRef === "develop" && baseRef === "main") {
              return;
            }

            const hasSpec = /\bS-\d{3}\b/.test(text);
            const hasStory = /\bUS-\d{3}\b/.test(text);
            const hasUseCase = /\bUC-\d{3}\b/.test(text);
            const hasTests = /(BDD-\d{3}|TDD-S-\d{3}|tests?)/i.test(text);

            if (!hasSpec) {
              core.setFailed("PR must reference at least one canonical spec ID (S-XXX).");
            }

            if (!hasStory) {
              core.setFailed("PR must reference at least one user story ID (US-XXX).");
            }

            if (!hasUseCase) {
              core.setFailed("PR must reference at least one canonical use case ID (UC-XXX).");
            }

            if (!hasTests) {
              core.setFailed("PR must describe associated tests or reference BDD/TDD artifacts.");
            }

      - name: Validate Git Flow PR policy
        shell: bash
        run: |
          set -euo pipefail

          head_ref="${{ github.head_ref }}"
          base_ref="${{ github.base_ref }}"

          [[ "$head_ref" =~ ^feature/.+ || "$head_ref" == "develop" ]] || {
            echo "Pull Request source branch must match feature/* or develop"
            exit 1
          }

          [[ "$base_ref" == "main" || "$base_ref" == "develop" ]] || {
            echo "Pull Request target branch must be main or develop"
            exit 1
          }

      - name: Validate changed files against traceability rules
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          echo "$changed_files"

          code_changes=$(echo "$changed_files" | grep -E '\.(cs|ts|tsx|js|jsx)$' || true)
          test_changes=$(echo "$changed_files" | grep -E '(^|/)(tests|Tests|__tests__)/|\.feature$|TDD-S-' || true)

          if [[ -n "$code_changes" && -z "$test_changes" ]]; then
            echo "Code changes detected without associated tests or testing artifacts."
            exit 1
          fi

      - name: Validate repository hygiene rules
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/validate-repo-hygiene.sh

      - name: Validate architecture guardrails on domain code
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          domain_files=$(git diff --name-only "$base_ref"...HEAD | grep -Ei 'domain/.+\.cs$' || true)

          if [[ -z "$domain_files" ]]; then
            exit 0
          fi

          forbidden='Http|HttpClient|DbContext|Npgsql|RabbitMQ|SignalR|EntityFramework|SqlConnection'

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            if grep -E "$forbidden" "$file" > /dev/null; then
              echo "Forbidden infrastructure dependency found in domain file: $file"
              exit 1
            fi
          done <<< "$domain_files"

      - name: Validate traceability docs still exist
        shell: bash
        run: |
          set -euo pipefail

          [[ -f "$DOCS_ROOT/03-TRACEABILITY-MODEL.md" ]]
          [[ -f "$DOCS_ROOT/15-traceability/03-USE-CASES-TO-SPECS.md" ]]
          [[ -f "$DOCS_ROOT/15-traceability/05-SPECS-TO-TESTS.md" ]]

      - name: Validate Copilot execution layer guardrails
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          if echo "$changed_files" | grep -Eq '^\.claude/'; then
            echo "Legacy .claude assets are not allowed."
            exit 1
          fi

          if echo "$changed_files" | grep -Eq '^AGENTS\.md$'; then
            echo "Do not add AGENTS.md while .github/copilot-instructions.md is the repo-wide instruction file."
            exit 1
          fi

          ai_changes=$(echo "$changed_files" | grep -E '^\.ai-entrypoint\.md$|^ai/.+|^\.github/(copilot-instructions\.md|copilot/.+|instructions/.+\.instructions\.md|prompts/.+\.prompt\.md|agents/.+\.agent\.md|skills/.+/SKILL\.md|scripts/.+)$|^\.githooks/.+' || true)

          if [[ -n "$ai_changes" ]]; then
            [[ -f "$DOCS_ROOT/16-generation-pack/08-COPILOT-OPERATING-MODEL.md" ]] || {
              echo "Missing canonical Copilot operating model doc."
              exit 1
            }

            [[ -f "$DOCS_ROOT/16-generation-pack/09-AI-RUNTIME-POLICY.md" ]] || {
              echo "Missing canonical AI runtime policy doc."
              exit 1
            }

            [[ -f "$DOCS_ROOT/16-generation-pack/10-AI-TESTING-AND-OBSERVABILITY.md" ]] || {
              echo "Missing canonical AI testing and observability doc."
              exit 1
            }

            [[ -f ".ai-entrypoint.md" ]] || {
              echo "Missing repository AI entrypoint."
              exit 1
            }
          fi

      - name: Validate read-only agent permissions
        shell: bash
        run: |
          set -euo pipefail

          readonly_agents=(
            ".github/agents/traceability-auditor.agent.md"
            ".github/agents/docs-gap-detector.agent.md"
            ".github/agents/policy-reviewer.agent.md"
            ".github/agents/gitflow-governor.agent.md"
          )

          for file in "${readonly_agents[@]}"; do
            if grep -Eq 'tools: \[[^]]*(edit|execute|todo|agent)' "$file"; then
              echo "Read-only agent has forbidden tools: $file"
              exit 1
            fi
          done

      - name: Validate AI prompt routing
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'agent: "policy-reviewer"' .github/prompts/qa-task.prompt.md || {
            echo "qa-task prompt must use policy-reviewer."
            exit 1
          }

          grep -q 'Artifacts Reviewed' .github/agents/rlapp-delivery.agent.md || {
            echo "rlapp-delivery must keep the structured output contract."
            exit 1
          }

          grep -q 'agent: "gitflow-governor"' .github/prompts/gitflow-check.prompt.md || {
            echo "gitflow-check prompt must use gitflow-governor."
            exit 1
          }

          grep -q 'agent: "commit-agent"' .github/prompts/commit-agent.prompt.md || {
            echo "commit-agent prompt must use commit-agent."
            exit 1
          }

      - name: Validate compatibility mirrors
        shell: bash
        run: |
          set -euo pipefail

          for file in .github/agents/*.agent.md; do
            rel_path="${file#./}"
            grep -q "canonical_path: ${rel_path}" .github/copilot/agents.yaml || {
              echo "agents.yaml compatibility mirror is out of sync for ${rel_path}."
              exit 1
            }
          done

          for file in .github/skills/*/SKILL.md; do
            rel_path="${file#./}"
            grep -q "canonical_path: ${rel_path}" .github/copilot/skills.yaml || {
              echo "skills.yaml compatibility mirror is out of sync for ${rel_path}."
              exit 1
            }
          done

          grep -q '^entrypoint: .ai-entrypoint.md$' .github/copilot/guardrails.yaml || {
            echo "guardrails.yaml must declare .ai-entrypoint.md."
            exit 1
          }

          grep -q '^branch_policy:' .github/copilot/guardrails.yaml || {
            echo "guardrails.yaml must declare branch policy metadata."
            exit 1
          }

      - name: Validate commit automation scripts and hooks exist
        shell: bash
        run: |
          set -euo pipefail

          [[ -f .github/scripts/validate-conventional-commit.sh ]]
          [[ -f .github/scripts/generate-conventional-commit.sh ]]
          [[ -f .github/scripts/git-automation.sh ]]
          [[ -f .github/scripts/validate-repo-hygiene.sh ]]
          [[ -f .githooks/commit-msg ]]
          [[ -f .githooks/pre-push ]]

      - name: Detect frontend quality scope
        if: github.event.action != 'edited'
        id: frontend_quality_scope
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          if echo "$changed_files" | grep -Eq '^(apps/frontend/)'; then
            echo "run_frontend_quality=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_frontend_quality=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip frontend quality for non-frontend PR changes
        if: github.event.action != 'edited' && steps.frontend_quality_scope.outputs.run_frontend_quality != 'true'
        shell: bash
        run: |
          echo "Frontend typecheck/lint/build skipped because the PR does not change apps/frontend."

      - name: Setup Node 22 for frontend quality
        if: steps.frontend_quality_scope.outputs.run_frontend_quality == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies for quality validation
        if: steps.frontend_quality_scope.outputs.run_frontend_quality == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/frontend ci

      - name: Run frontend typecheck in PR gate
        if: steps.frontend_quality_scope.outputs.run_frontend_quality == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/frontend run typecheck

      - name: Run frontend lint in PR gate
        if: steps.frontend_quality_scope.outputs.run_frontend_quality == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/frontend run lint

      - name: Run frontend build in PR gate
        if: steps.frontend_quality_scope.outputs.run_frontend_quality == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/frontend run build

      - name: Detect role smoke scope
        if: github.event.action != 'edited'
        id: role_smoke_scope
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          if echo "$changed_files" | grep -Eq '^(apps/backend/|apps/frontend/|docker-compose\.yml$|Dockerfile\.backend$|Dockerfile\.frontend$)'; then
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip role smoke for non-runtime PR changes
        if: github.event.action != 'edited' && steps.role_smoke_scope.outputs.run_smoke != 'true'
        shell: bash
        run: |
          echo "Role smoke skipped because the PR does not change backend, frontend, or integration runtime slices."

      - name: Setup Node 22 for role smoke
        if: steps.role_smoke_scope.outputs.run_smoke == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Docker Compose config for role smoke
        if: steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker compose config --quiet

      - name: Start frontend validation stack for role smoke
        if: steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker compose --profile frontend up --build -d --wait

      - name: Run role-based frontend smoke in PR gate
        if: steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        env:
          RLAPP_SMOKE_BASE_URL: http://127.0.0.1:3000
        run: |
          set -euo pipefail
          npm --prefix apps/frontend run smoke:roles

      - name: Dump backend logs on role smoke failure
        if: failure() && steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        run: |
          docker compose logs backend --tail=200 || true

      - name: Dump frontend logs on role smoke failure
        if: failure() && steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        run: |
          docker compose logs frontend --tail=200 || true

      - name: Stop frontend validation stack for role smoke
        if: always() && steps.role_smoke_scope.outputs.run_smoke == 'true'
        shell: bash
        run: |
          docker compose --profile frontend down --remove-orphans || true
