name: Commit Standards

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  validate-commit-subjects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Conventional Commit subjects
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="refs/remotes/origin/${{ github.base_ref }}"
            git fetch --no-tags origin "${{ github.base_ref }}:${base_ref}"
            merge_base="$(git merge-base "$base_ref" "${{ github.event.pull_request.head.sha }}")"
            [[ -n "$merge_base" ]] || {
              echo "Unable to determine merge-base for ${base_ref} and ${{ github.event.pull_request.head.sha }}"
              exit 1
            }
            range="$merge_base..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              range="HEAD~1..HEAD"
            elif ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
              echo "Previous commit ${before} is unreachable (force push). Validating HEAD only."
              range="HEAD~1..HEAD"
            else
              range="$before..HEAD"
            fi
          fi

          commits="$(git log --format=%s $range)"
          [[ -n "$commits" ]] || { echo "No commit subjects found to validate."; exit 0; }

          while IFS= read -r subject; do
            [[ -n "$subject" ]] || continue
            ./.github/scripts/validate-conventional-commit.sh "$subject"
          done <<< "$commits"
